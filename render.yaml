services:
  - type: web
    name: trustgraph-xpp-api
    env: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements-render.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.11
      - key: MONGODB_DB
        value: trustgraph_xpp
      - key: TRUSTGRAPH_LIGHTWEIGHT
        value: "true"
